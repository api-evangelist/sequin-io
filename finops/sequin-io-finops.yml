meters:
- name: change_records
  description: Postgres change records / operations streamed to sinks, billed per million on Sequin Cloud.
  unit: records
  aggregation: sum
  dimensions:
  - account
  - sink
  - database
- name: data_volume
  description: Data volume streamed through Sequin Cloud, billed per GB.
  unit: bytes
  aggregation: sum
  dimensions:
  - account
  - sink
- name: backfill_records
  description: Rows replayed via backfills; count against throughput on Cloud.
  unit: records
  aggregation: sum
  dimensions:
  - account
  - sink
- name: self_hosted_compute
  description: Infrastructure cost of running the self-hosted Sequin service (no Sequin invoice).
  unit: hours
  aggregation: sum
  dimensions:
  - deployment
principles:
- name: Visibility
  description: Track change-record and data-volume throughput per sink and database; on self-hosted, monitor the Sequin service and destination infrastructure costs.
- name: Allocation
  description: Name sinks and databases per workload/team so throughput maps to internal cost centers.
- name: Optimization
  description: Filter and transform changes at the sink to avoid streaming unneeded rows; scope backfills to specific tables/rows; self-host to trade vendor fees for owned infrastructure when volume is high.
- name: Accountability
  description: Assign owners per sink; review monthly throughput against Cloud allowances or self-hosted infrastructure budget.
