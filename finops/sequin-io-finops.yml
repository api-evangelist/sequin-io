description: >-
  FinOps view of Sequin spend. Sequin's core CDC engine is open source (MIT) and
  free to self-host - in that model the cost is your own compute, storage, and
  network for running the Sequin service and the downstream sinks, with no
  vendor invoice. Sequin Cloud is the managed offering, billed on a usage basis
  primarily driven by change-record / operation throughput and data volume
  streamed, above a free allowance. Enterprise agreements cover high-volume or
  self-managed-with-support arrangements.
notes: >-
  Cloud per-unit rates are not reconciled here; verify on the Sequin pricing
  page. For self-hosted deployments, the dominant costs are infrastructure
  (Sequin service + destination systems like Kafka/SQS) rather than a Sequin
  license fee.
sources:
