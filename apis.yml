aid: sequin-io
url: https://raw.githubusercontent.com/api-evangelist/sequin-io/refs/heads/main/apis.yml
name: Sequin
kind: company
description: Sequin is an open-source Postgres change data capture (CDC) engine that
  streams Postgres rows and changes to streams, queues, and search indexes - Kafka,
  SQS, SNS, Kinesis, Redis, NATS, RabbitMQ, Elasticsearch, Typesense, GCP Pub/Sub,
  Azure Event Hubs, and HTTP/webhook endpoints - with exactly-once processing,
  backfills, and low-latency delivery. Sequin is self-hostable and also available
  as Sequin Cloud. Resources are configured declaratively via a sequin.yaml file or
  programmatically through the Management API; consumers can pull changes over HTTP
  via the Sequin Stream sink.
